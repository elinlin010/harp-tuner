<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgD3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgD3)"/>

  <!-- Handle -->
  <rect x="488" y="562" width="48" height="278" rx="24" fill="white"/>

  <!-- Crossbar -->
  <rect x="316" y="492" width="392" height="48" rx="24" fill="white"/>

  <!-- Frame: left arm rises straight, then curves into a harp-neck arch, -->
  <!-- then curves back down the right arm. One continuous path.          -->
  <path d="M 316,490 L 316,268 Q 316,202 400,186 Q 512,156 624,186 Q 708,202 708,268 L 708,490"
        fill="none" stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Harp strings — hang from the arch down to the crossbar.            -->
  <!-- They are placed on the arch's inner surface (the flat central arc). -->
  <!-- Longer (central) strings are slightly thicker — bass register.     -->
  <g stroke="white" stroke-linecap="round" opacity="0.82">
    <line x1="446" y1="172" x2="446" y2="492" stroke-width="6"/>
    <line x1="488" y1="162" x2="488" y2="492" stroke-width="7.5"/>
    <line x1="512" y1="158" x2="512" y2="492" stroke-width="9"/>
    <line x1="536" y1="162" x2="536" y2="492" stroke-width="7.5"/>
    <line x1="578" y1="172" x2="578" y2="492" stroke-width="6"/>
  </g>
</svg>
