<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgE4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgE4)"/>

  <!-- A musical note where the stem, flag/neck, and soundboard together  -->
  <!-- form a complete harp silhouette. The notehead is at the base.     -->
  <!-- Reading: note (stem + notehead + curved flag) = harp (column +    -->
  <!-- neck + soundboard + strings).                                      -->

  <!-- Harp strings — rendered first, behind all structural elements     -->
  <!-- Nearly vertical, fanning very slightly toward the soundboard.     -->
  <g stroke="white" stroke-linecap="round" opacity="0.78">
    <line x1="378" y1="186" x2="386" y2="730" stroke-width="5.5"/>
    <line x1="424" y1="162" x2="434" y2="730" stroke-width="5"/>
    <line x1="468" y1="150" x2="480" y2="730" stroke-width="4.5"/>
    <line x1="510" y1="152" x2="524" y2="730" stroke-width="4"/>
  </g>

  <!-- Soundboard — angled right side of the harp, from neck end down  -->
  <path d="M 546,206 L 574,730"
        fill="none" stroke="white" stroke-width="42" stroke-linecap="round"/>

  <!-- Neck / flag — harp neck doubles as the note flag.                -->
  <!-- Curves from column top up-right, then down to the soundboard.   -->
  <path d="M 306,234 Q 306,148 400,126 Q 496,104 546,206"
        fill="none" stroke="white" stroke-width="42" stroke-linecap="round"/>

  <!-- Column / stem — the harp's left pillar, the note's stem          -->
  <rect x="284" y="232" width="44" height="510" rx="22" fill="white"/>

  <!-- Base foot connecting column and soundboard base                  -->
  <rect x="264" y="718" width="328" height="44" rx="22" fill="white"/>

  <!-- Notehead at column / base junction                               -->
  <ellipse cx="248" cy="726" rx="98" ry="72"
           transform="rotate(-22, 248, 726)" fill="white"/>
</svg>
