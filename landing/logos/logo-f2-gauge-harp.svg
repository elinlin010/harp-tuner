<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgF2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgF2)"/>

  <!-- Harp neck = tuner arc.                                            -->
  <!-- Centre (512,720), radius 320.  sweep-flag=1 → upward arc.        -->
  <!-- Arc top sits at (512, 400) = the "perfectly in tune" point.       -->

  <!-- Harp strings — hang vertically from their arc attachment point    -->
  <!-- down to the base.  Longer strings (near the centre) are thicker.  -->
  <!-- Rendered before the arc and column so they sit behind them.        -->

  <!-- Arc attachment coordinates (standard-math angle from +x axis):    -->
  <!--  θ=150° → (235, 560)   θ=130° → (306, 475)   θ=110° → (403, 420) -->
  <!--  θ=70°  → (621, 420)   θ=50°  → (718, 475)   θ=30°  → (789, 560) -->
  <g stroke="white" stroke-linecap="round" opacity="0.80">
    <!-- outer left  (shortest → thinnest) -->
    <line x1="235" y1="560" x2="235" y2="718" stroke-width="5"/>
    <!-- mid left -->
    <line x1="306" y1="475" x2="306" y2="718" stroke-width="7"/>
    <!-- inner left  (longest → thickest) -->
    <line x1="403" y1="420" x2="403" y2="718" stroke-width="9"/>
    <!-- inner right -->
    <line x1="621" y1="420" x2="621" y2="718" stroke-width="9"/>
    <!-- mid right -->
    <line x1="718" y1="475" x2="718" y2="718" stroke-width="7"/>
    <!-- outer right -->
    <line x1="789" y1="560" x2="789" y2="718" stroke-width="5"/>
  </g>

  <!-- Harp neck arc (also the tuner gauge arc) -->
  <path d="M 192 720 A 320 320 0 0 1 832 720"
        fill="none" stroke="white" stroke-width="48" stroke-linecap="round" opacity="0.90"/>

  <!-- Harp column = tuner needle pointing straight up to arc centre.   -->
  <!-- A centred needle signals "perfectly in tune".                     -->
  <line x1="512" y1="720" x2="512" y2="410"
        stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- Small arrowhead at column / needle tip -->
  <polygon points="512,372 492,416 532,416" fill="white"/>

  <!-- Harp base (also the gauge baseline) -->
  <rect x="172" y="708" width="680" height="44" rx="22" fill="white"/>

  <!-- Pivot circle at column foot -->
  <circle cx="512" cy="720" r="30" fill="white"/>
  <circle cx="512" cy="720" r="16" fill="#b8401a"/>
</svg>
