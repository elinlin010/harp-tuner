<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgD4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgD4)"/>

  <!-- Handle -->
  <rect x="488" y="572" width="48" height="268" rx="24" fill="white"/>

  <!-- Crossbar -->
  <rect x="320" y="492" width="384" height="48" rx="24" fill="white"/>

  <!-- Left prong -->
  <rect x="320" y="202" width="50" height="338" rx="25" fill="white"/>
  <ellipse cx="345" cy="202" rx="25" ry="25" fill="white"/>

  <!-- Right prong -->
  <rect x="654" y="202" width="50" height="338" rx="25" fill="white"/>
  <ellipse cx="679" cy="202" rx="25" ry="25" fill="white"/>

  <!-- Harp strings radiating from a single apex point between the prong tips. -->
  <!-- They fan outward like a harp viewed from directly behind.               -->
  <!-- Outer (longer) strings are heavier — bass register of the harp.        -->
  <!-- Apex: (512, 218)                                                        -->
  <g stroke="white" stroke-linecap="round" opacity="0.82">
    <!-- outer left  (longest → thickest) -->
    <line x1="512" y1="218" x2="390" y2="492" stroke-width="8"/>
    <line x1="512" y1="218" x2="430" y2="492" stroke-width="7"/>
    <line x1="512" y1="218" x2="472" y2="492" stroke-width="6"/>
    <!-- centre — straight down (shortest) -->
    <line x1="512" y1="218" x2="512" y2="492" stroke-width="5"/>
    <line x1="512" y1="218" x2="552" y2="492" stroke-width="6"/>
    <line x1="512" y1="218" x2="594" y2="492" stroke-width="7"/>
    <!-- outer right -->
    <line x1="512" y1="218" x2="634" y2="492" stroke-width="8"/>
  </g>
</svg>
