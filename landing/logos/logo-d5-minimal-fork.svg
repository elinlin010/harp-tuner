<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgD5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgD5)"/>

  <!-- Handle -->
  <rect x="488" y="572" width="48" height="268" rx="24" fill="white"/>

  <!-- Crossbar — slightly heavier than D2 to balance the single string -->
  <rect x="308" y="490" width="408" height="52" rx="26" fill="white"/>

  <!-- Left prong — bolder -->
  <rect x="308" y="196" width="56" height="342" rx="28" fill="white"/>
  <ellipse cx="336" cy="196" rx="28" ry="28" fill="white"/>

  <!-- Right prong — bolder -->
  <rect x="660" y="196" width="56" height="342" rx="28" fill="white"/>
  <ellipse cx="688" cy="196" rx="28" ry="28" fill="white"/>

  <!-- Single bold harp string, perfectly centred in the U.             -->
  <!-- Represents the one note being tuned — minimal, meditative.       -->
  <line x1="512" y1="220" x2="512" y2="490"
        stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.86"/>
</svg>
