<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f2ec"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <linearGradient id="sageB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a7c6f"/>
      <stop offset="100%" stop-color="#2d5a50"/>
    </linearGradient>
  </defs>

  <!-- Background: warm off-white -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgB)"/>

  <!-- Abstract bloom: curved strings radiating from a focal point -->
  <!-- The focal point is the tuning peg area, top-left ish -->
  <!-- Strings sweep in arcs from peg (cx=390, cy=290) down to base -->

  <!-- Arch frame - simple thin elegant harp outline -->
  <!-- Left column -->
  <rect x="280" y="260" width="34" height="510" rx="17" fill="url(#sageB)"/>
  <!-- Base -->
  <rect x="260" y="748" width="390" height="34" rx="17" fill="url(#sageB)"/>
  <!-- Neck arch -->
  <path d="M 297 260 Q 297 168 400 150 Q 510 132 570 215" fill="none" stroke="url(#sageB)" stroke-width="34" stroke-linecap="round"/>
  <!-- Soundboard -->
  <path d="M 570 215 L 614 748" fill="none" stroke="url(#sageB)" stroke-width="34" stroke-linecap="round"/>

  <!-- Strings: gentle curved arcs, each a quadratic bezier for slight bow -->
  <g fill="none" stroke="#4a7c6f" stroke-linecap="round" opacity="0.85">
    <path d="M 340 285 Q 342 510 340 750" stroke-width="5.5"/>
    <path d="M 378 267 Q 384 505 384 750" stroke-width="4.5"/>
    <path d="M 416 255 Q 426 503 428 750" stroke-width="4"/>
    <path d="M 454 247 Q 468 502 472 750" stroke-width="3.5"/>
    <path d="M 492 243 Q 510 502 516 750" stroke-width="3"/>
    <path d="M 530 243 Q 552 502 560 750" stroke-width="2.5"/>
    <path d="M 566 248 Q 590 502 602 750" stroke-width="2"/>
  </g>

  <!-- Dot accent at neck junction: tuning peg cluster -->
  <circle cx="297" cy="260" r="20" fill="#4a7c6f"/>
  <circle cx="570" cy="215" r="15" fill="#4a7c6f" opacity="0.6"/>
</svg>
