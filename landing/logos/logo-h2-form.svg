<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgH2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgH2)"/>

  <!--
    THE FORM
    The harp as a filled white silhouette — column, neck, soundboard, base
    closed into one shape. Like a wax seal impression or a letterpress stamp.
    The column is narrow; the soundboard splays outward slightly as it descends.
    At 40px it reads as a solid geometric mark. At 192px you see the harp.
  -->
  <path d="
    M 292,856
    L 292,348
    Q 292,136 512,152
    Q 732,168 716,268
    L 784,856
    Z
  " fill="white"/>

  <!--
    Strings as terracotta cuts through the white form — suggests the interior
    of the instrument without adding visual noise.
  -->
  <g stroke="#b84228" stroke-linecap="round" opacity="0.55">
    <line x1="392" y1="284" x2="392" y2="808" stroke-width="7"/>
    <line x1="490" y1="228" x2="490" y2="808" stroke-width="6"/>
    <line x1="588" y1="234" x2="588" y2="808" stroke-width="5.5"/>
    <line x1="676" y1="258" x2="676" y2="808" stroke-width="5"/>
  </g>
</svg>
