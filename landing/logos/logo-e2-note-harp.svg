<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgE2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgE2)"/>

  <!-- Harp strings — rendered first so the stem and neck paint on top  -->
  <!-- They fan from four points on the neck curve back to the stem,    -->
  <!-- mimicking harp strings strung between neck and column.           -->
  <!-- Longer strings are slightly thicker (lower pitch).               -->
  <g stroke="white" stroke-linecap="round" opacity="0.76">
    <line x1="544" y1="180" x2="506" y2="720" stroke-width="4"/>
    <line x1="586" y1="140" x2="506" y2="720" stroke-width="4.5"/>
    <line x1="638" y1="120" x2="506" y2="720" stroke-width="5"/>
    <line x1="698" y1="138" x2="506" y2="720" stroke-width="5.5"/>
  </g>

  <!-- Neck / flag — harp neck shape doubles as the eighth-note flag.   -->
  <!-- Curves up and right from stem top, then arcs slightly downward.  -->
  <path d="M 522,230 Q 522,148 610,128 Q 698,108 736,200"
        fill="none" stroke="white" stroke-width="44" stroke-linecap="round"/>

  <!-- Stem (harp column) — painted on top of string roots -->
  <rect x="500" y="228" width="44" height="512" rx="22" fill="white"/>

  <!-- Notehead — chunky tilted oval at stem base -->
  <ellipse cx="422" cy="726" rx="110" ry="80"
           transform="rotate(-22, 422, 726)" fill="white"/>
</svg>
