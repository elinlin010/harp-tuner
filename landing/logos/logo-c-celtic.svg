<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
    <!-- Soft paper-white for the mark -->
  </defs>

  <!-- Background: terracotta/coral -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgC)"/>

  <!-- Rounded, friendly harp — slightly chunky like a folk instrument -->
  <!-- Column: left, with a slight taper -->
  <path d="M 272 272 Q 268 500 272 760" fill="none" stroke="white" stroke-width="52" stroke-linecap="round"/>

  <!-- Base: wide and slightly curved, friendly -->
  <path d="M 252 760 Q 450 790 640 760" fill="none" stroke="white" stroke-width="52" stroke-linecap="round"/>

  <!-- Neck: the distinctive curved top — fuller and more organic -->
  <path d="M 272 272 Q 272 140 390 118 Q 530 96 600 220" fill="none" stroke="white" stroke-width="52" stroke-linecap="round"/>

  <!-- Soundboard: slightly curved outward for friendly organic feel -->
  <path d="M 600 220 Q 650 490 640 760" fill="none" stroke="white" stroke-width="48" stroke-linecap="round"/>

  <!-- Strings: 6 strings, nicely spaced, with slight horizontal offset for perspective -->
  <g stroke="white" stroke-linecap="round" opacity="0.88">
    <line x1="342" y1="300" x2="342" y2="758" stroke-width="8"/>
    <line x1="392" y1="278" x2="396" y2="758" stroke-width="7"/>
    <line x1="442" y1="263" x2="452" y2="758" stroke-width="6"/>
    <line x1="490" y1="254" x2="508" y2="758" stroke-width="5"/>
    <line x1="536" y1="250" x2="562" y2="758" stroke-width="4.5"/>
    <line x1="578" y1="250" x2="612" y2="758" stroke-width="4"/>
  </g>

  <!-- Small decorative notch at column top — classic Celtic harp forepillar cap -->
  <circle cx="272" cy="264" r="30" fill="white"/>
  <circle cx="272" cy="264" r="16" fill="url(#bgC)"/>
</svg>
