<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgD2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgD2)"/>

  <!-- Handle (bottom stem) -->
  <rect x="488" y="572" width="48" height="268" rx="24" fill="white"/>

  <!-- Crossbar connecting prongs to handle -->
  <rect x="316" y="494" width="392" height="48" rx="24" fill="white"/>

  <!-- Left prong -->
  <rect x="316" y="202" width="50" height="340" rx="25" fill="white"/>
  <!-- Left prong cap -->
  <ellipse cx="341" cy="202" rx="25" ry="25" fill="white"/>

  <!-- Right prong -->
  <rect x="658" y="202" width="50" height="340" rx="25" fill="white"/>
  <!-- Right prong cap -->
  <ellipse cx="683" cy="202" rx="25" ry="25" fill="white"/>

  <!-- Harp strings filling the space between the two prongs.           -->
  <!-- String tops form a gentle arc (evoking the harp neck curve)     -->
  <!-- from the prong cap level at the edges to a centre minimum.      -->
  <!-- Longer/centre strings are thicker (lower pitch in harp terms).  -->
  <g stroke="white" stroke-linecap="round" opacity="0.82">
    <!-- x=400  outer — shortest, thinnest -->
    <line x1="400" y1="264" x2="400" y2="494" stroke-width="5.5"/>
    <!-- x=448 -->
    <line x1="448" y1="246" x2="448" y2="494" stroke-width="7"/>
    <!-- x=496  centre — longest, thickest -->
    <line x1="496" y1="236" x2="496" y2="494" stroke-width="9"/>
    <!-- x=544 (mirror) -->
    <line x1="544" y1="236" x2="544" y2="494" stroke-width="9"/>
    <!-- x=592 -->
    <line x1="592" y1="246" x2="592" y2="494" stroke-width="7"/>
    <!-- x=640  outer — shortest, thinnest -->
    <line x1="640" y1="264" x2="640" y2="494" stroke-width="5.5"/>
  </g>
</svg>
