<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgE5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgE5)"/>

  <!-- A musical note where the notehead is surrounded by harp strings  -->
  <!-- radiating outward — like a string being plucked on a harp.       -->
  <!-- The strings fan downward from the notehead in a harp-spread arc, -->
  <!-- directly evoking the image of fingers running across the strings. -->

  <!-- Harp strings radiating from the notehead area downward and left. -->
  <!-- Each string has a slightly different angle and length.           -->
  <g stroke="white" stroke-linecap="round" opacity="0.80">
    <!-- Strings fan from notehead (cx≈394, cy≈714) outward             -->
    <!-- Inner (shorter, treble) to outer (longer, bass)                -->
    <line x1="358" y1="696" x2="230" y2="800" stroke-width="5"   opacity="0.55"/>
    <line x1="348" y1="714" x2="192" y2="786" stroke-width="5.5" opacity="0.62"/>
    <line x1="346" y1="736" x2="188" y2="840" stroke-width="6"   opacity="0.70"/>
    <line x1="360" y1="756" x2="210" y2="888" stroke-width="7"   opacity="0.78"/>
    <line x1="386" y1="766" x2="270" y2="910" stroke-width="8"   opacity="0.86"/>
    <line x1="418" y1="762" x2="342" y2="906" stroke-width="9"   opacity="0.92"/>
  </g>

  <!-- Neck / flag — harp-shaped curve from stem top                   -->
  <path d="M 524,226 Q 524,144 612,124 Q 700,104 738,196"
        fill="none" stroke="white" stroke-width="44" stroke-linecap="round"/>

  <!-- Stem (harp column) -->
  <rect x="502" y="224" width="44" height="510" rx="22" fill="white"/>

  <!-- Notehead — bold, positioned where strings radiate from          -->
  <ellipse cx="424" cy="720" rx="112" ry="82"
           transform="rotate(-22, 424, 720)" fill="white"/>
</svg>
