<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
    <!-- Soft inner shadow to give the mark depth against the gradient -->
    <filter id="soft">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7a2010" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background — terracotta gradient -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!--
    Harp silhouette — filled white shape.
    Column (left) is narrow and vertical.
    Neck arches up from column top, peaks, comes down to soundboard top.
    Soundboard is slightly wider and splays outward as it descends.
    Base closes the shape horizontally.
    Filled solid reads clearly at every size including 29×29px.
  -->
  <path d="
    M 272,852
    L 272,346
    Q 272,138 512,152
    Q 752,166 714,270
    L 778,852
    Z
  " fill="white" filter="url(#soft)"/>

  <!--
    Three harp strings — terracotta lines cutting through the white silhouette.
    Suggest the interior of the instrument without cluttering the mark.
    Visible at 80px+; blend into the shape at smaller sizes.
  -->
  <g stroke="#b84026" stroke-linecap="round">
    <line x1="390" y1="282" x2="390" y2="810" stroke-width="14" opacity="0.45"/>
    <line x1="494" y1="224" x2="494" y2="810" stroke-width="12" opacity="0.40"/>
    <line x1="596" y1="242" x2="596" y2="810" stroke-width="11" opacity="0.35"/>
  </g>
</svg>
