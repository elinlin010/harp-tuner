<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgE3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c84b2f"/>
      <stop offset="100%" stop-color="#9e3420"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bgE3)"/>

  <!-- Two eighth notes beamed at the top. The beam is the harp's neck arch, -->
  <!-- the left stem is the column, the right is the soundboard,             -->
  <!-- and strings hang between them — a harp hiding in ♫.                  -->

  <!-- Harp strings — rendered behind stems so stems paint over the roots   -->
  <g stroke="white" stroke-linecap="round" opacity="0.80">
    <!-- From arch top down to notehead level. Center strings are longest → thicker. -->
    <line x1="390" y1="284" x2="390" y2="742" stroke-width="6"/>
    <line x1="448" y1="274" x2="448" y2="742" stroke-width="7"/>
    <line x1="512" y1="268" x2="512" y2="742" stroke-width="8.5"/>
    <line x1="576" y1="274" x2="576" y2="742" stroke-width="7"/>
    <line x1="634" y1="284" x2="634" y2="742" stroke-width="6"/>
  </g>

  <!-- Left stem (harp column) -->
  <rect x="298" y="302" width="44" height="440" rx="22" fill="white"/>

  <!-- Right stem (harp soundboard) -->
  <rect x="682" y="302" width="44" height="440" rx="22" fill="white"/>

  <!-- Arch / neck connecting the two stem tops — the harp's neck curve     -->
  <path d="M 320,302 Q 512,234 704,302"
        fill="none" stroke="white" stroke-width="46" stroke-linecap="round"/>

  <!-- Left notehead -->
  <ellipse cx="320" cy="758" rx="100" ry="72"
           transform="rotate(-22, 320, 758)" fill="white"/>

  <!-- Right notehead -->
  <ellipse cx="704" cy="758" rx="100" ry="72"
           transform="rotate(22, 704, 758)" fill="white"/>
</svg>
